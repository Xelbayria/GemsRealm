name: Report Bug
description: Found a bug? Report it.
title: "[🐞]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        BUG

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: "Code of Conduct"
      options:
        - label: "Use the LATEST version of the mod and ALL its dependencies (or ideally all your mods). Pro tip: don't install mods manually, use a launcher."
          required: true
        - label: "Ensure the version of EveryCompat & Moonlight Lib are up to date"
          required: true
        - label: "Don't use Optifine or hybrid-servers (Mohist/Velocity/etc) and have tried without big game altering mods (Sodium/Lithium/etc)."
          required: true
        - label: "Try with the mod alone. If issue does not persist then try removing half of your mods at the time to find the conflicting mod."
          required: false
        - label: "Check that this bug hasn't been reported already."
          required: true

  - type: dropdown
    id: version-loader
    attributes:
      label: "Minecraft Version & Loader"
      description: "What's the Minecraft version & loader"
      options:
        - 1.21.1 - NEOFORGE
        - 1.21.1 - FABRIC
        - 1.20.1 - FABRIC
        - 1.20.1 - FORGE
        - OTHER-SPECIFY
      default: 0
    validations:
      required: true

  - type: input
    id: gems_realm
    attributes:
      label: GemRealms Version
      description: The current version of GemRealms you are using
      placeholder: ex. gems_realm-1.20-2.7.0
    validations:
      required: true

  - type: input
    id: moonlight
    attributes:
      label: Moonlight Lib Version
      description: The current version of Moonlight Lib you are using
      placeholder: ex. moonlight-1.20-2.8.46-forge
    validations:
      required: true

  - type: input
    id: everycompat
    attributes:
      label: Every Compat Version
      description: The current version of Every Compat you are using
      placeholder: everycomp-1.20-2.9.0-forge
    validations:
      required: true

  - type: textarea
    id: issue-with-mods
    attributes:
      label: "Issue with mods"
      description: "List the mods that Gems Realm is having issue with. The minimal modlist will help DEV to try and reproduce"
      placeholder: "example:\n- Strata-version (MetalType Mod) \n- Chipped-version (Supported Mod)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Details
      description: Provide a clear description of what happened and how to reproduce it.
      placeholder: |
        What happened:
        
        Steps to reproduce (OPTIONAL):
        1. 
        2.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Media
      description: |
        Drag and drop your **latest.log** or **crash-report** here. 
        
        These are found in: `.minecraft/logs/` or `.minecraft/crash-reports/`
        
        Include additional screenshot if needed.
      placeholder: "Drop files or paste logs here..."
    validations:
      required: true
